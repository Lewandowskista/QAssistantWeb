name: Release Portable App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    
    permissions:
      contents: write 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install Windows App SDK
      run: |
        Invoke-WebRequest -Uri "https://aka.ms/windowsappsdk/1.8/latest/windowsappruntimeinstall-x64.exe" -OutFile "WinAppRuntime.exe"
        Start-Process -FilePath "WinAppRuntime.exe" -Args "--quiet" -Wait

    - name: Restore NuGet Packages
      run: |
        dotnet restore QAssistant/QAssistant.csproj -r win-x64

    - name: Publish App
      run: |
        dotnet publish QAssistant/QAssistant.csproj -c Release -r win-x64 --self-contained true --no-restore /p:PublishTrimmed=false /p:PublishReadyToRun=false -o ./publish_output

    - name: Download Windows App Runtime Redistributable
      run: |
        Invoke-WebRequest -Uri "https://aka.ms/windowsappsdk/1.8/latest/windowsappruntimeinstall-x64.exe" -OutFile "./publish_output/WinAppRuntime_Setup.exe"

    - name: Zip Release
      run: |
        Compress-Archive -Path ./publish_output/* -DestinationPath ./QAssistant_v${{ github.ref_name }}.zip

    - name: Publish to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        files: ./QAssistant_v${{ github.ref_name }}.zip
        generate_release_notes: true
        body: "## Installation\n1. Extract the zip\n2. Run WinAppRuntime_Setup.exe first (only needed once per machine)\n3. Run QAssistant.exe"